name: CI/CD — Wallet Service

# ─────────────────────────────────────────────────────────────────────
#  Triggered ONLY when wallet-service/** or common/** changes on main.
#  Three strict sequential jobs:
#    1. test   → Maven + Testcontainers (real Postgres + Kafka)
#    2. docker → Build & push multi-stage image to GHCR
#    3. deploy → SSH to Oracle Cloud VM, blue/green-lite swap, health gate, rollback
# ─────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'wallet-service/**'
      - 'common/**'
  workflow_dispatch:

env:
  IMAGE:        ghcr.io/${{ github.repository_owner }}/revpay-wallet-service
  SERVICE_NAME: wallet-service
  SERVICE_PORT: 8082

jobs:

  # ══════════════════════════════════════════════════════════════════
  #  Job 1 — Test
  # ══════════════════════════════════════════════════════════════════
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit + integration tests (Testcontainers)
        run: |
          chmod +x mvnw
          ./mvnw clean verify \
            -pl common,wallet-service \
            -am \
            -B \
            --no-transfer-progress

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-wallet-service
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════
  #  Job 2 — Docker Build & Push (GHCR)
  # ══════════════════════════════════════════════════════════════════
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-stage image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: wallet-service/Dockerfile
          push: true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════
  #  Job 3 — Deploy to Oracle Cloud VM (Health Gate + Auto-Rollback)
  # ══════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Oracle Cloud VM
    runs-on: ubuntu-latest
    needs: docker
    environment: production

    steps:
      - name: Deploy, health-check, and auto-rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key:      ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ env.IMAGE }}"
            SHA_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
            NAME="${{ env.SERVICE_NAME }}"
            PORT="${{ env.SERVICE_PORT }}"

            echo "════════════════════════════════════════════════"
            echo "▶ Deploying $NAME → $IMAGE:$SHA_TAG"
            echo "════════════════════════════════════════════════"

            docker pull "$IMAGE:$SHA_TAG"

            PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' "$NAME" 2>/dev/null || echo "")
            echo "  ↩ Previous image: ${PREVIOUS_IMAGE:-<none — first deploy>}"

            docker stop "$NAME" 2>/dev/null || true
            docker rm   "$NAME" 2>/dev/null || true

            echo "▶ Starting $NAME on port $PORT"
            docker run -d \
              --name "$NAME" \
              --network upi-net \
              --restart unless-stopped \
              -p "$PORT:$PORT" \
              --env-file /opt/revpay/.env \
              "$IMAGE:$SHA_TAG"

            echo "▶ Waiting for /actuator/health to return UP..."
            RETRIES=6
            HEALTHY=false
            for i in $(seq 1 $RETRIES); do
              sleep 5
              STATUS=$(docker exec "$NAME" \
                wget -qO- "http://localhost:$PORT/actuator/health" 2>/dev/null \
                | grep -o '"status":"UP"' || echo "")
              if [ "$STATUS" = '"status":"UP"' ]; then
                echo "✅ $NAME is healthy (attempt $i/$RETRIES)"
                HEALTHY=true
                break
              fi
              echo "  ⏳ Attempt $i/$RETRIES — not healthy yet"
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "❌ Health check FAILED — initiating rollback"
              docker stop "$NAME" 2>/dev/null || true
              docker rm   "$NAME" 2>/dev/null || true
              if [ -n "$PREVIOUS_IMAGE" ]; then
                echo "↩ Rolling back to $PREVIOUS_IMAGE"
                docker run -d \
                  --name "$NAME" \
                  --network upi-net \
                  --restart unless-stopped \
                  -p "$PORT:$PORT" \
                  --env-file /opt/revpay/.env \
                  "$PREVIOUS_IMAGE"
                echo "↩ Rollback complete"
              else
                echo "⚠ No previous image found — $NAME remains stopped"
              fi
              exit 1
            fi

            docker image prune -f --filter "until=72h" || true

            echo "════════════════════════════════════════════════"
            echo "✅ Deploy complete: $NAME → $IMAGE:$SHA_TAG"
            echo "════════════════════════════════════════════════"

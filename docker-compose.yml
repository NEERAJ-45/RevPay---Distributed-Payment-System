version: "3.9"

services:
  # ═══════════════════════════════════════
  #  PostgreSQL — single instance, 3 DBs
  # ═══════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: upi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - upi-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════
  #  Redis
  # ═══════════════════════════════════════
  redis:
    image: redis:7.2-alpine
    container_name: upi-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - upi-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════
  #  Zookeeper (Kafka dependency)
  # ═══════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: upi-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - upi-net

  # ═══════════════════════════════════════
  #  Kafka
  # ═══════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: upi-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - upi-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════
  #  Kafka UI (browser at :8090)
  # ═══════════════════════════════════════
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: upi-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - upi-net

  # ═══════════════════════════════════════
  #  Nginx — Load Balancer (browser at :80)
  # ═══════════════════════════════════════
  nginx:
    image: nginx:1.25-alpine
    container_name: upi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach Spring Boot on host machine
    networks:
      - upi-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════
  #  Nginx Prometheus Exporter
  # ═══════════════════════════════════════
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: upi-nginx-exporter
    restart: unless-stopped
    command:
      - -nginx.scrape-uri=http://nginx/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - upi-net

  # ═══════════════════════════════════════
  #  Prometheus
  # ═══════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: upi-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    networks:
      - upi-net

  # ═══════════════════════════════════════
  #  Grafana (browser at :3000)
  #  Default login: admin / admin
  # ═══════════════════════════════════════
  grafana:
    image: grafana/grafana:10.4.2
    container_name: upi-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/upi-transactions.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - upi-net

  # ═══════════════════════════════════════
  #  Zipkin (browser at :9411)
  # ═══════════════════════════════════════
  zipkin:
    image: openzipkin/zipkin:3
    container_name: upi-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - upi-net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  upi-net:
    driver: bridge


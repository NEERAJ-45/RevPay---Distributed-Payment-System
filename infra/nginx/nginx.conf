worker_processes auto;

events {
    worker_connections 1024;
}

http {

    # ── Logging ────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;

    # ── Upstream: API Gateway (load-balanced) ─────────────
    # Points to the Spring Boot API Gateway running on your host machine.
    # Add more entries here when you scale to multiple gateway instances.
    upstream api_gateway {
        least_conn;                             # route to least-busy instance
        server host.docker.internal:8080;       # Spring Boot on host machine
        # server host.docker.internal:8085;    # uncomment for a 2nd instance
        keepalive 32;
    }

    # ── Rate Limiting ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=upi_limit:10m rate=30r/s;

    # ── Main Server Block ──────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint (no rate limit)
        location /health {
            access_log off;
            return 200 "Nginx OK\n";
            add_header Content-Type text/plain;
        }

        # ── Proxy all traffic to Spring Cloud Gateway ──────
        location / {
            limit_req zone=upi_limit burst=50 nodelay;

            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }

        # ── Nginx stub_status for Prometheus scraping ──────
        location /nginx_status {
            stub_status on;
            allow 172.0.0.0/8;   # allow only Docker internal network
            deny  all;
            access_log off;
        }
    }
}

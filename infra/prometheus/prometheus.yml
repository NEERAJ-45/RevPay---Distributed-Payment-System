global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: 'mini-upi-local'

scrape_configs:

  # ── Nginx (via nginx-exporter sidecar) ────────────────
  # nginx-exporter runs IN Docker so its hostname resolves normally
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service: 'nginx-lb'

  # ── Spring Boot Services ───────────────────────────────
  # Spring Boot apps run on the HOST machine, not in Docker.
  # Prometheus inside Docker reaches them via host.docker.internal.
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'api-gateway'

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: 'user-service'

  - job_name: 'wallet-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: 'wallet-service'

  - job_name: 'transaction-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels:
          service: 'transaction-service'

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8084']
        labels:
          service: 'notification-service'

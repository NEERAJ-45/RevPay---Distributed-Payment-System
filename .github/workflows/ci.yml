name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: upi

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify Required Secrets
        run: |
          test -n "${{ secrets.POSTGRES_USER }}" || (echo "POSTGRES_USER missing" && exit 1)
          test -n "${{ secrets.POSTGRES_PASSWORD }}" || (echo "POSTGRES_PASSWORD missing" && exit 1)
          test -n "${{ secrets.REDIS_PASSWORD }}" || (echo "REDIS_PASSWORD missing" && exit 1)
          test -n "${{ secrets.JWT_SECRET }}" || (echo "JWT_SECRET missing" && exit 1)

      - name: Remove obsolete 'version' from docker-compose.yml
        run: |
          sed -i '/^version:/d' docker-compose.yml

      - name: Create .env
        run: |
          cat <<EOF > .env
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432

          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}

          KAFKA_BOOTSTRAP_SERVERS=kafka:9092

          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRY_MS=86400000

          USER_SERVICE_PORT=8081
          WALLET_SERVICE_PORT=8082
          TRANSACTION_SERVICE_PORT=8083
          NOTIFICATION_SERVICE_PORT=8084
          GATEWAY_PORT=8080
          EOF

      - name: Start Infrastructure
        run: |
          docker compose --env-file .env up -d postgres redis kafka zookeeper
          docker compose --env-file .env ps

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if docker compose --env-file .env exec -T postgres pg_isready -U ${{ secrets.POSTGRES_USER }}; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres..."
            sleep 2
          done
          docker compose --env-file .env logs postgres
          exit 1

      - name: Wait for Redis
        run: |
          for i in {1..20}; do
            if docker compose --env-file .env exec -T redis redis-cli -a "${{ secrets.REDIS_PASSWORD }}" ping 2>/dev/null | grep -q PONG; then
              echo "Redis is ready"
              exit 0
            fi
            echo "Waiting for Redis..."
            sleep 2
          done
          docker compose --env-file .env logs redis
          exit 1

      - name: Build and Test
        run: |
          chmod +x mvnw
          ./mvnw clean verify -B -pl common,user-service -am -DfailIfNoTests=true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/'